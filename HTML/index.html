<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotHotHot – Tableau de bord</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo">
            <span class="logo-text">HotHotHot</span>
        </div>
        <nav class="nav" aria-label="Navigation principale">
            <a href="#" class="nav-link active" aria-current="page">Accueil</a>
            <a href="documentation.html" class="nav-link">Documentation</a>
            <a href="compte.html" class="nav-link">Mon compte</a>
        </nav>
    </div>
</header>

<main class="main">

    <div class="tab-bar" role="tablist" aria-label="Navigation des vues">
        <button
                id="btnJour"
                class="tab-btn tab-btn--active"
                role="tab"
                aria-selected="true"
                aria-controls="pageJour"
        >
            <span aria-hidden="true">📡</span> Temps réel
        </button>
        <button
                id="btnHist"
                class="tab-btn"
                role="tab"
                aria-selected="false"
                aria-controls="pageHist"
        >
             Historique
        </button>
    </div>
    <section
            id="pageJour"
            class="tab-panel"
            role="tabpanel"
            aria-labelledby="btnJour"
    >
        <div class="ws-status-bar">
            <span id="wsStatusDot" class="ws-dot ws-dot--connecting" aria-hidden="true"></span>
            <p id="wsStatus" class="ws-status" aria-live="polite" aria-atomic="true">
                Connexion en cours…
            </p>
        </div>

        <div class="capteurs-grid">

            <article class="capteur" id="capteur-int" aria-label="Capteur intérieur">
                <header class="capteur-header">
                    <h2 class="capteur-titre">Intérieur</h2>
                </header>
                <div class="capteur-valeur-wrapper">
            <span
                    id="temp-int"
                    class="capteur-valeur"
                    aria-live="polite"
                    aria-atomic="true"
                    aria-label="Température intérieure"
            >--</span>
                    <span class="capteur-unite" aria-hidden="true">°C</span>
                </div>
                <p id="minmax-int" class="capteur-minmax" aria-live="polite"></p>
                <p id="comment-int" class="capteur-alerte" aria-live="assertive" aria-atomic="true"></p>
            </article>

            <article class="capteur" id="capteur-ext" aria-label="Capteur extérieur">
                <header class="capteur-header">
                    <h2 class="capteur-titre">Extérieur</h2>
                </header>
                <div class="capteur-valeur-wrapper">
            <span
                    id="temp-ext"
                    class="capteur-valeur"
                    aria-live="polite"
                    aria-atomic="true"
                    aria-label="Température extérieure"
            >--</span>
                    <span class="capteur-unite" aria-hidden="true">°C</span>
                </div>
                <p id="minmax-ext" class="capteur-minmax" aria-live="polite"></p>
                <p id="comment-ext" class="capteur-alerte" aria-live="assertive" aria-atomic="true"></p>
            </article>

        </div>
    </section>
    <section
            id="pageHist"
            class="tab-panel tab-panel--hidden"
            role="tabpanel"
            aria-labelledby="btnHist"
            hidden
    >
        <h2 class="panel-titre">Historique des températures</h2>
        <p class="panel-placeholder">Le graphe d'historique sera affiché ici (Lot 2).</p>
    </section>

</main>

<dialog id="alerteDialog" class="alerte-dialog" aria-modal="true" aria-labelledby="alerteTitre">
    <h2 id="alerteTitre" class="alerte-dialog-titre">Alerte</h2>
    <p id="alerteMessage" class="alerte-dialog-message"></p>
    <button id="alerteClose" class="alerte-dialog-close" autofocus>Fermer</button>
</dialog>

<script src="../JavaScript/tableau.js"></script>
</body>
</html>
