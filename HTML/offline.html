<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotHotHot – Hors ligne</title>
    <link rel="icon" href="../Icons/favicon.png" type="image/png">
    <link rel="stylesheet" href="../CSS/offline.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/css/iziToast.min.css">
</head>
<body>
<main role="main" aria-labelledby="offline-heading">
    <div class="icon" aria-hidden="true">📡</div>
    <h1 id="offline-heading">Vous êtes hors ligne</h1>
    <p>
        Impossible de charger cette page pour l'instant.<br>
        Vérifiez votre connexion Internet et réessayez.
    </p>
    <p>
        Les données en temps réel nécessitent une connexion,
        mais les pages déjà visitées restent disponibles.
    </p>
    <button onclick="window.location.reload()" aria-label="Réessayer de charger la page">Réessayer</button>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/izitoast/1.4.0/js/iziToast.min.js"></script>
<script src="../JavaScript/notifications.js"></script>
<script src="../JavaScript/pwa.js"></script>
<script src="../JavaScript/sw-registration.js" defer></script>
</body>
</html>
